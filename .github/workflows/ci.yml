name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]

# packages:write is needed for publish-nightly to push to GHCR
permissions:
  contents: read
  packages: write

env:
  # Commit timestamp used for deterministic nightly version strings.
  # Defined at workflow level so all jobs agree on the same value.
  COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}

jobs:
  # ---------------------------------------------------------------------------
  # Change detection: skip heavy CI for docs-only changes
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.force.outputs.code || steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      hermes: ${{ steps.force.outputs.hermes || steps.filter.outputs.hermes }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'scripts/**'
              - 'patches/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'vitest.config.ts'
              - 'vitest.evals.config.ts'
              - 'package.json'
              - 'biome.json'
              - '.craft.yml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/publish.yml'
              - '.github/workflows/release.yml'
              - 'codecov.yml'
            # Docs-only changes still need check-docs to run (so the
            # generator reflects config-schema updates), but skip the
            # heavy test/binary jobs.
            docs:
              - 'packages/website/**'
              - 'scripts/generate-config-docs.ts'
              - 'scripts/generate-env-docs.ts'
              - 'packages/core/src/config.ts'
              - 'packages/gateway/src/**/*.ts'
              - 'packages/core/src/**/*.ts'
            # The real-hermes ABC check installs an external `hermes-agent`, so
            # scope it to hermes changes only — it must never gate unrelated PRs.
            hermes:
              - 'packages/hermes/**'
              - '.github/workflows/ci.yml'

      # Force code=true on main/release pushes — these always run full CI.
      # dorny/paths-filter only matters for PRs.
      - name: Force full CI on main/release push
        id: force
        if: github.event_name == 'push'
        run: |
          echo "code=true" >> "$GITHUB_OUTPUT"
          echo "hermes=true" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Lint GitHub Actions workflow files (catches schema errors, empty `with:`
  # blocks, expression type mismatches, invalid action inputs, etc.)
  # Runs unconditionally — sub-second, no Node/pnpm deps, and workflow bugs
  # should never slip through regardless of which files changed.
  # ---------------------------------------------------------------------------
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Lint workflow files
        # -shellcheck="" disables shellcheck integration — the existing
        # run: blocks have cosmetic shellcheck findings (SC2086, SC2129,
        # SC2035, SC2012) that are not bugs. The value of actionlint is
        # in workflow schema validation, not shell style.
        run: ./actionlint -color

  test:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Override the workflow-default permissions (contents: read, packages: write)
    # to also grant what the Codecov upload step needs to post PR comments and
    # commit statuses. A job-level block REPLACES the default, so the inherited
    # perms are re-listed here.
    permissions:
      contents: read
      pull-requests: write
      statuses: write
      actions: read
    outputs:
      nightly-version: ${{ steps.nightly.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true  # fetch all tag refs for craft changelog

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Build all packages so tests can resolve workspace dependencies
      - run: pnpm run build

      # Note: the @loreai/gateway bundle is built by the root `pretest`
      # hook that runs before `pnpm test` (see package.json). No pre-test
      # bundle step needed here. The later "Build npm bundle" step (with
      # SENTRY_AUTH_TOKEN) rebuilds the bundle for sourcemap upload and
      # binary smoke tests.

      # Restore the vendored embedding model so tests use a local model
      # instead of downloading from HuggingFace Hub (avoids transient 429s).
      # Same cache key as binary-smoke-native / build-nightly-binaries.
      - name: Restore vendor staging
        id: vendor-cache
        uses: actions/cache@v5
        with:
          path: .vendor-build
          key: vendor-${{ hashFiles('packages/core/package.json', 'packages/gateway/script/vendor-embeddings.ts', 'packages/gateway/script/vendor-paths.ts', 'packages/gateway/script/vendor-sqlite-vec.ts') }}

      - name: Populate vendor staging (cache miss)
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: pnpm tsx packages/gateway/script/vendor-embeddings.ts

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        # Runs the gateway bundle (needed by tests) then `vitest run --coverage`.
        # `--coverage` is baked into the script rather than forwarded via
        # `pnpm test -- --coverage`, because pnpm does NOT forward args past the
        # `test` lifecycle script — the flag was silently dropped. Produces
        # ./coverage/lcov.info for the Codecov upload below.
        run: pnpm run test:coverage
        env:
          # Silence the ~85-line "ExperimentalWarning: SQLite is an experimental
          # feature" noise from node:sqlite — emitted once per worker fork in
          # vitest's threads pool. Doesn't suppress real test failures.
          NODE_NO_WARNINGS: 1
          # Point the local embedding provider at the vendored model cache root
          # (transformers.js resolves <root>/<modelId>/...). Keeps the test run
          # off HuggingFace Hub. See packages/core/src/embedding-vendor.ts.
          LORE_LOCAL_MODEL_PATH: ${{ github.workspace }}/.vendor-build/.model-cache

      # Upload coverage to Codecov. Uses Sentry's fork with the standard
      # GITHUB_TOKEN (no CODECOV_TOKEN secret needed). `informational-patch` is
      # true on push events so the 80% patch gate only BLOCKS on pull requests;
      # on main/release pushes it reports without failing. Patch target (80%)
      # and project-informational status are configured in codecov.yml.
      - name: Coverage Report
        if: '!cancelled()'
        uses: getsentry/codecov-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ./coverage/lcov.info
          informational-patch: ${{ github.event_name == 'push' }}

      # Compute nightly version once, pass as job output to downstream jobs.
      # Only on main pushes — PRs and release branches don't get nightly versions.
      #
      # Uses craft to determine the next semver bump from conventional commits,
      # so nightlies sort AHEAD of the current release (e.g. 0.19.0-dev.X > 0.18.0).
      - name: Fetch commits since last release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          CURRENT=$(jq -r .version packages/gateway/package.json)
          # Deepen the shallow clone to include commits since the release tag.
          # --shallow-exclude sets the boundary at the tag commit (exclusive),
          # giving us all commits in the TAG..HEAD range.
          if git rev-parse "$CURRENT" >/dev/null 2>&1; then
            git fetch --shallow-exclude="$CURRENT" origin main
          else
            # No matching tag (e.g. first release) — fetch full history
            git fetch --unshallow
          fi

      - name: Install Craft CLI
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          CRAFT_URL=$(curl -fsSL https://api.github.com/repos/getsentry/craft/releases/latest \
            | jq -r '.assets[] | select(.name == "craft") | .browser_download_url')
          sudo curl -fsSL -o /usr/local/bin/craft "$CRAFT_URL"
          sudo chmod +x /usr/local/bin/craft

      - name: Compute nightly version
        id: nightly
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Deterministic timestamp from commit
          TS=$(date -d "$COMMIT_TIMESTAMP" +%s 2>/dev/null \
            || date -j -f "%Y-%m-%dT%H:%M:%S" "$COMMIT_TIMESTAMP" +%s 2>/dev/null \
            || date +%s)

          # 2. Get bump type from craft (analyzes conventional commits since last tag)
          BUMP_TYPE="patch"  # conservative fallback
          CURRENT=$(jq -r .version packages/gateway/package.json)
          CRAFT_ERR=$(mktemp)
          if CRAFT_JSON=$(craft changelog --since "$CURRENT" --format json 2>"$CRAFT_ERR"); then
            DETECTED=$(echo "$CRAFT_JSON" | jq -r '.bumpType // empty')
            if [ -n "$DETECTED" ]; then
              BUMP_TYPE="$DETECTED"
              echo "Craft detected bump type: ${BUMP_TYPE}"
            else
              echo "Craft returned null bumpType, falling back to: ${BUMP_TYPE}"
            fi
          else
            echo "::warning::craft changelog failed, falling back to bump type: ${BUMP_TYPE}"
            cat "$CRAFT_ERR"
          fi
          rm -f "$CRAFT_ERR"

          echo "Current version: ${CURRENT}"

          # 3. Compute next version by applying bump type
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"

          VERSION="${NEXT}-dev.${TS}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Nightly version: ${VERSION} (bump: ${BUMP_TYPE}, from: ${CURRENT})"

      # -----------------------------------------------------------------
      # CLI: npm bundle + smoke test (every run)
      # -----------------------------------------------------------------
      - name: Build npm bundle (CJS)
        run: pnpm --filter @loreai/gateway run bundle
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Smoke-test npm bundle under Node.js
        run: |
          node packages/gateway/dist/bin.cjs --version
          node packages/gateway/dist/bin.cjs help

          # Start gateway, hit health endpoint, shut down
          node packages/gateway/dist/bin.cjs start -p 7990 &
          SERVER_PID=$!
          sleep 2
          curl -sf http://127.0.0.1:7990/health | jq .
          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true

      # Note: the bundle-exports test runs as part of the main `pnpm test`
      # step above (discovered via vitest.config.ts). No need to re-run it.

      # -----------------------------------------------------------------
      # CLI: standalone binary build + smoke test
      # -----------------------------------------------------------------

      # Cache fossilize's downloaded Node.js binaries so we don't
      # re-download ~200 MB per platform on every CI run.
      - name: Cache fossilize Node binaries
        id: fossilize-cache
        uses: actions/cache@v5
        with:
          path: .node-cache
          key: fossilize-${{ hashFiles('packages/gateway/script/build-binary-sea.ts') }}

      - name: Set nightly version
        # Inject the nightly version into package.json before building
        # so it gets baked into the binary via esbuild define.
        if: steps.nightly.outputs.version != ''
        run: |
          jq --arg v "${{ steps.nightly.outputs.version }}" '.version = $v' \
            packages/gateway/package.json > packages/gateway/package.json.tmp
          mv packages/gateway/package.json.tmp packages/gateway/package.json

      # Vendor staging populated by the cache restore + fallback steps above.
      - name: Build linux-x64 binary
        run: pnpm --filter @loreai/gateway run build:binary:sea --platforms linux-x64
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          FOSSILIZE_CACHE_DIR: ${{ github.workspace }}/.node-cache

      - name: Smoke-test standalone binary
        run: |
          ./packages/gateway/dist-bin/lore-linux-x64 --version
          ./packages/gateway/dist-bin/lore-linux-x64 help

          # Verify the vendor wrapper actually executed and registered the
          # model paths on globalThis. --print-vendor-info dumps the
          # registration; the JQ check confirms the structure matches what
          # the LocalProvider expects. Catches build regressions that would
          # silently ship a binary without local embeddings.
          info=$(./packages/gateway/dist-bin/lore-linux-x64 --print-vendor-info)
          echo "Vendor info: $info"
          echo "$info" | jq -e '.target == "linux-x64" and .localModelPath != null and .version != null' \
            || (echo "::error::vendor not embedded in linux-x64 binary"; exit 1)

          # End-to-end: run an actual embedding through the bundled
          # transformers.js + nomic-embed-text-v1.5. Catches model-load
          # regressions (tokenizer files, ONNX layout) that the
          # registration check alone wouldn't surface.
          ./packages/gateway/dist-bin/lore-linux-x64 --check-embeddings \
            || (echo "::error::--check-embeddings failed in linux-x64 binary"; exit 1)

          # Verify the embedded sqlite-vec extension actually loads (native
          # vector search), not the JS brute-force fallback. Catches a broken
          # asset-embed / extraction chain in the SEA binary. Two assertions:
          # the main DB connection AND the off-thread read-worker pool (the path
          # production vector search runs on) must both load the extension —
          # the worker thread extracts/loads it independently (#1033).
          vec=$(./packages/gateway/dist-bin/lore-linux-x64 --check-vec)
          echo "Vec info: $vec"
          echo "$vec" | grep -q '^ok vec_version=v' \
            || (echo "::error::native sqlite-vec not loaded in linux-x64 binary: $vec"; exit 1)
          echo "$vec" | grep -q '^ok worker vec_available=true' \
            || (echo "::error::native sqlite-vec not loaded on the read-worker path in linux-x64 binary: $vec"; exit 1)

          # Round-trip a generic read job through the off-thread read-worker pool
          # (recall / forSession fan-out rides on this). Guards the SEA seam that
          # rode in on the vector-worker asset with zero build changes (#1029).
          # Unlike --check-vec (native vec may legitimately fall back), the read
          # path is pure JS + node:sqlite and MUST work everywhere — fatal.
          ro=$(./packages/gateway/dist-bin/lore-linux-x64 --check-read-offload || true)
          echo "Read-offload: $ro"
          echo "$ro" | grep -q '^ok read-offload via worker' \
            || (echo "::error::read-worker offload seam broken in linux-x64 binary: $ro"; exit 1)

          # Start gateway, hit health endpoint, shut down
          ./packages/gateway/dist-bin/lore-linux-x64 start -p 7991 &
          SERVER_PID=$!
          sleep 2
          curl -sf http://127.0.0.1:7991/health | jq .
          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true

      # Upload the uncompressed binary for downstream jobs (generate-patches)
      - name: Upload binary artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: lore-linux-x64
          path: packages/gateway/dist-bin/lore-linux-x64

      # Prepare platform-independent staging dir for cross-platform builds.
      # The linux-x64 build above already ran esbuild and populated
      # .sea-staging/, but we run --prepare-only explicitly to make the
      # intent clear and ensure the staging dir is complete for darwin-arm64.
      - name: Prepare staging for cross-platform builds
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          pnpm --filter @loreai/gateway run build:binary:sea \
            --platforms darwin-arm64 --prepare-only
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          FOSSILIZE_CACHE_DIR: ${{ github.workspace }}/.node-cache

      - name: Upload staging artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: sea-staging
          path: packages/gateway/.sea-staging/
          # .sea-staging is a dot-prefixed (hidden) directory
          include-hidden-files: true

      # -----------------------------------------------------------------
      # Release: build all packages + pack tarballs + multi-platform binaries
      # -----------------------------------------------------------------
      - name: Build all packages
        if: startsWith(github.ref, 'refs/heads/release/')
        run: pnpm run build

      # Pack each workspace package into its own tarball. Craft's npm target
      # with `workspaces: true` discovers all four and publishes them in
      # dependency order (@loreai/core → @loreai/opencode + @loreai/pi + @loreai/gateway).
      #
      # We use `pnpm pack` (not `npm pack`) because pnpm automatically rewrites
      # `workspace:*` dependency specifiers to the actual version being packed.
      # `npm pack` leaves the literal "workspace:*" in the tarball's
      # package.json which breaks installs.
      #
      # We also mirror @loreai/opencode → opencode-lore by repacking with the
      # package name swapped. Both tarballs have identical content; the two
      # names are published in parallel so existing users keep working.
      - name: Pack tarballs
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          mkdir -p dist-tarballs
          for pkg in packages/core packages/opencode packages/pi packages/gateway; do
            echo "Packing $pkg"
            (cd "$pkg" && pnpm pack --pack-destination ../../dist-tarballs)
          done

          # Mirror @loreai/opencode as opencode-lore (legacy alias).
          # Extract the tarball, swap the package name in package.json, repack.
          version=$(jq -r '.version' packages/opencode/package.json)
          mirror_dir=$(mktemp -d)
          tar -xzf "dist-tarballs/loreai-opencode-${version}.tgz" -C "$mirror_dir"
          jq '.name = "opencode-lore"' "$mirror_dir/package/package.json" > "$mirror_dir/package/package.json.tmp"
          mv "$mirror_dir/package/package.json.tmp" "$mirror_dir/package/package.json"
          (cd "$mirror_dir" && tar -czf "$GITHUB_WORKSPACE/dist-tarballs/opencode-lore-${version}.tgz" package)
          rm -rf "$mirror_dir"

          # Native ONNX Runtime per-platform packages (@loreai/onnxruntime-<os>-<arch>):
          # pack all 6 and inject them as optionalDependencies into the gateway
          # tarball (in place). Lets `npm i`/plugin installs use native ORT, with
          # the bundled WASM as the dist-only fallback (#763). See pack-ort-npm.ts.
          pnpm tsx packages/gateway/script/pack-ort-npm.ts \
            --version "$version" --tarballs "$GITHUB_WORKSPACE/dist-tarballs"

          echo "--- Final tarballs: ---"
          ls -la dist-tarballs/
          echo "--- Package name in each: ---"
          for t in dist-tarballs/*.tgz; do
            name=$(tar -xzOf "$t" package/package.json | jq -r '.name')
            echo "$(basename "$t") → $name"
          done

      # Vendor staging dirs are populated from the build above (same job
      # = same workspace). The cache step above ensures `.vendor-build/`
      # exists even when the test-job's build:binary call was skipped on
      # PR runs. No additional vendor step needed here.

      # rcodesign is needed to ad-hoc sign macOS binaries when cross-
      # compiling on Linux. Without it, darwin binaries are unsigned and
      # cannot execute on Apple Silicon.
      # NOTE: Keep in sync with the identical step in build-nightly-binaries.
      - name: Install rcodesign (macOS cross-signing)
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          RCODESIGN_VERSION="0.29.0"
          RCODESIGN_SHA256="dbe85cedd8ee4217b64e9a0e4c2aef92ab8bcaaa41f20bde99781ff02e600002"
          TARBALL="apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL -o "/tmp/${TARBALL}" \
            "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F${RCODESIGN_VERSION}/${TARBALL}"
          echo "${RCODESIGN_SHA256}  /tmp/${TARBALL}" | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C /usr/local/bin --strip-components=1 \
            "apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl/rcodesign"
          rm "/tmp/${TARBALL}"
          rcodesign --version

      - name: Build release binaries (all platforms)
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          rm -rf packages/gateway/dist-bin
          pnpm --filter @loreai/gateway run build:binary:sea \
            --platforms "darwin-arm64,linux-arm64,linux-x64,windows-x64" \
            --release
          echo "--- Release binaries: ---"
          ls -la packages/gateway/dist-bin/
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          FOSSILIZE_CACHE_DIR: ${{ github.workspace }}/.node-cache

      - name: Upload tarballs
        if: startsWith(github.ref, 'refs/heads/release/')
        uses: actions/upload-artifact@v7
        with:
          name: npm-tarball
          path: dist-tarballs/*.tgz

      - name: Upload binaries
        if: startsWith(github.ref, 'refs/heads/release/')
        uses: actions/upload-artifact@v7
        with:
          name: release-binaries
          path: packages/gateway/dist-bin/*.gz

      # Also upload uncompressed release binaries (needed for patch generation)
      - name: Upload uncompressed release binaries
        if: startsWith(github.ref, 'refs/heads/release/')
        uses: actions/upload-artifact@v7
        with:
          name: release-binaries-raw
          path: |
            packages/gateway/dist-bin/lore-*
            !packages/gateway/dist-bin/*.gz

  # ---------------------------------------------------------------------------
  # Doc-generation drift check.
  #
  # Runs `pnpm run check:docs`, which invokes
  # `scripts/generate-config-docs.ts --check` to diff the generated
  # `packages/website/src/content/docs/docs/configuration.md` against the
  # current Zod schema. Fails if the committed file is stale.
  #
  # Runs on any change to the schema, the generator, the website, or the
  # `ci.yml` itself (via the `docs` paths-filter). Skipped for
  # unrelated changes.
  # ---------------------------------------------------------------------------

  check-docs:
    name: Check generated docs
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      # The generator imports from the workspace, so we need the workspace
      # built once. The build step is cheap (no native binaries) and
      # guarantees `packages/core/dist` exists for the import.
      - run: pnpm --filter @loreai/core run build
      - run: pnpm run check:docs

  # ---------------------------------------------------------------------------
  # Docs link integrity.
  #
  # Builds the docs site, serves it on a local port, and runs linkinator
  # against it to catch broken internal relative links. Only real broken
  # links fail the job — known linkinator false positives (its
  # clean-URL resolution bug) are filtered by the wrapper script.
  #
  # Runs on any change to the website, docs content, or the link-checker
  # script itself. Skipped for unrelated changes.
  # ---------------------------------------------------------------------------

  check-links:
    name: Check docs links
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:links

  # ---------------------------------------------------------------------------
  # PR-preview link integrity.
  #
  # The check-links job above only exercises the PRODUCTION build (base
  # `/`), where site-root-absolute links (`/docs/...`) are correct. On PR
  # previews the site is served from `/_preview/pr-<n>/`, so those links
  # must be base-prefixed by the prefix-base-links integration. This job
  # builds a preview (fixed sentinel PR_NUMBER) and fails if ANY internal
  # root-absolute link is left un-prefixed — covering markdown body,
  # frontmatter hero links, and component links.
  #
  # Runs on any change to the website, docs content, or the checker
  # script itself. Skipped for unrelated changes.
  # ---------------------------------------------------------------------------

  check-preview-links:
    name: Check preview links
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:preview-links

  # ---------------------------------------------------------------------------
  # Social-media meta tag integrity.
  #
  # Builds the website (auto-runs the favicon-assets integration that
  # generates og-image.png) and asserts every HTML page has the full set
  # of Open Graph + Twitter Card meta tags with correct values. Catches
  # regressions where a page is added, a tag is dropped, the OG image
  # URL drifts, or the image dimensions/format change.
  #
  # Runs on any change to the website, the social-meta checker, or
  # unrelated code (force-pushed main/release branches run full CI).
  # Skipped for unrelated changes.
  # ---------------------------------------------------------------------------

  check-social:
    name: Check social meta tags
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      # The script will build the site itself if dist/ is missing — keeps
      # the job self-contained and mirrors the local dev experience.
      - run: pnpm run check:social

  # ---------------------------------------------------------------------------
  # Sentry pnpm patch integrity.
  #
  # Verifies the @sentry/node patch correctly strips unused integration
  # modules. Catches silent regressions on Sentry version bumps that would
  # re-inflate the bundle with dead code.
  # ---------------------------------------------------------------------------

  check-patches:
    name: Check Sentry patches
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:patches

  # ---------------------------------------------------------------------------
  # Cross-platform native binary smoke tests.
  #
  # The test job above only builds and runs the linux-x64 binary. Cross-
  # compiled darwin / windows binaries can't be exercised on a Linux
  # runner. This job catches runtime failures by building each native
  # binary on its own runner and running `--check-embeddings` end-to-end.
  #
  # Only on PRs (and main pushes) — release builds are gated separately.
  # ---------------------------------------------------------------------------

  binary-smoke-native:
    name: Binary smoke (${{ matrix.target }})
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runs-on: macos-14
            ext: ""
          - target: linux-arm64
            runs-on: ubuntu-24.04-arm
            ext: ""
          - target: windows-x64
            runs-on: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Reuse the cache the test job populated (same key). The
      # `.vendor-build/.model-cache/` tree contains the shared ONNX model
      # files (platform-independent) — safe to reuse across OS runners.
      - name: Restore vendor staging
        id: vendor-cache
        uses: actions/cache@v5
        with:
          path: .vendor-build
          key: vendor-${{ hashFiles('packages/core/package.json', 'packages/gateway/script/vendor-embeddings.ts', 'packages/gateway/script/vendor-paths.ts', 'packages/gateway/script/vendor-sqlite-vec.ts') }}

      - name: Populate vendor staging (cache miss)
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: pnpm tsx packages/gateway/script/vendor-embeddings.ts

      # Cache fossilize's downloaded Node.js binary for the current platform.
      - name: Cache fossilize Node binaries
        id: fossilize-cache
        uses: actions/cache@v5
        with:
          path: .node-cache
          key: fossilize-${{ matrix.target }}-${{ hashFiles('packages/gateway/script/build-binary-sea.ts') }}

      - name: Build ${{ matrix.target }} binary
        run: pnpm --filter @loreai/gateway run build:binary:sea --platforms ${{ matrix.target }}
        env:
          FOSSILIZE_CACHE_DIR: ${{ github.workspace }}/.node-cache
          LORE_TARGET: ${{ matrix.target }}

      # End-to-end smoke. The native runner can actually execute its own
      # binary, catching runtime failures that the linux-x64 job can't.
      - name: Smoke-test
        shell: bash
        env:
          LORE_TARGET: ${{ matrix.target }}
        run: |
          BIN="./packages/gateway/dist-bin/lore-${{ matrix.target }}${{ matrix.ext }}"
          "$BIN" --version
          info=$("$BIN" --print-vendor-info)
          echo "Vendor info: $info"
          echo "$info" | jq -e '.target == "${{ matrix.target }}" and .localModelPath != null and .version != null' \
            || (echo "::error::vendor not embedded in ${{ matrix.target }} binary"; exit 1)
          "$BIN" --check-embeddings \
            || (echo "::error::--check-embeddings failed in ${{ matrix.target }} binary"; exit 1)
          # Verify the embedded sqlite-vec extension loads. On macOS, loading an
          # unsigned extracted .dylib from a codesigned binary may be blocked by
          # library validation — treat darwin as a non-fatal warning until that
          # is resolved (it degrades to the JS fallback, never crashes).
          vec=$("$BIN" --check-vec)
          echo "Vec info: $vec"
          if echo "$vec" | grep -q '^ok vec_version=v'; then
            echo "native sqlite-vec OK (${{ matrix.target }})"
          elif [ "${{ matrix.target }}" = "darwin-arm64" ]; then
            echo "::warning::native sqlite-vec not loaded in darwin-arm64 (dylib codesigning?) — JS fallback in use: $vec"
          else
            echo "::error::native sqlite-vec not loaded in ${{ matrix.target }} binary: $vec"; exit 1
          fi
          # Same assertion for the off-thread read-worker pool — the path
          # production vector search actually runs on. The worker thread
          # extracts and loads the extension independently of the main thread
          # (#1033), so a green main-thread line above does not prove it.
          if echo "$vec" | grep -q '^ok worker vec_available=true'; then
            echo "native sqlite-vec read-worker path OK (${{ matrix.target }})"
          elif [ "${{ matrix.target }}" = "darwin-arm64" ]; then
            echo "::warning::native sqlite-vec not loaded on the read-worker path in darwin-arm64 (dylib codesigning?) — JS fallback in use: $vec"
          else
            echo "::error::native sqlite-vec not loaded on the read-worker path in ${{ matrix.target }} binary: $vec"; exit 1
          fi
          # Round-trip a generic read job through the off-thread read-worker pool
          # — the seam recall / forSession fan-out rides on, which rode into the
          # SEA on the vector-worker asset with zero build changes (#1029). Pure
          # JS + node:sqlite (no native vec), so it is FATAL on every target,
          # including darwin (unlike the --check-vec worker line above).
          ro=$("$BIN" --check-read-offload || true)
          echo "Read-offload: $ro"
          echo "$ro" | grep -q '^ok read-offload via worker' \
            || (echo "::error::read-worker offload seam broken in ${{ matrix.target }} binary: $ro"; exit 1)

  # ---------------------------------------------------------------------------
  # Nightly: build all platforms, generate patches, publish to GHCR
  # ---------------------------------------------------------------------------

  build-nightly-binaries:
    name: Build Nightly Binaries
    needs: [changes, test]
    # Only on main pushes (not PRs, not release branches)
    if: >-
      needs.changes.outputs.code == 'true' &&
      github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Set nightly version
        run: |
          jq --arg v "${{ needs.test.outputs.nightly-version }}" '.version = $v' \
            packages/gateway/package.json > packages/gateway/package.json.tmp
          mv packages/gateway/package.json.tmp packages/gateway/package.json
          echo "Building nightly version: ${{ needs.test.outputs.nightly-version }}"

      # Restore vendor staging dirs (populated by the test job's cache step,
      # keyed on package.json + the vendor scripts' contents).
      - name: Cache vendor staging dirs
        id: vendor-cache
        uses: actions/cache@v5
        with:
          path: .vendor-build
          key: vendor-${{ hashFiles('packages/core/package.json', 'packages/gateway/script/vendor-embeddings.ts', 'packages/gateway/script/vendor-paths.ts', 'packages/gateway/script/vendor-sqlite-vec.ts') }}

      - name: Populate vendor staging (cache miss)
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: pnpm tsx packages/gateway/script/vendor-embeddings.ts

      # Cache fossilize's downloaded Node.js binaries so nightly builds
      # don't re-download on every run.
      - name: Cache fossilize Node binaries
        id: fossilize-cache
        uses: actions/cache@v5
        with:
          path: .node-cache
          key: fossilize-${{ hashFiles('packages/gateway/script/build-binary-sea.ts') }}

      # darwin-arm64 is built natively on macOS (build-nightly-darwin job)
      # to get V8 code cache + native codesign.
      - name: Build platform binaries
        run: |
          pnpm --filter @loreai/gateway run build:binary:sea \
            --platforms "linux-arm64,linux-x64,windows-x64" \
            --release
          echo "--- Nightly binaries: ---"
          ls -la packages/gateway/dist-bin/
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          FOSSILIZE_CACHE_DIR: ${{ github.workspace }}/.node-cache

      - name: Upload compressed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nightly-binaries-gz
          path: packages/gateway/dist-bin/*.gz

      - name: Upload uncompressed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nightly-binaries-raw
          path: |
            packages/gateway/dist-bin/lore-*
            !packages/gateway/dist-bin/*.gz

  # ---------------------------------------------------------------------------
  # Nightly: build darwin-arm64 natively on macOS
  #
  # Cross-compiling darwin on Linux requires rcodesign (ad-hoc signing) and
  # cannot produce V8 code cache. Building natively on macOS gets both a
  # real codesign and a V8 snapshot, and lets us smoke-test the actual
  # shipped binary.
  # ---------------------------------------------------------------------------

  build-nightly-darwin:
    name: Build Nightly Darwin
    needs: [changes, test]
    if: >-
      needs.changes.outputs.code == 'true' &&
      github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Set nightly version
        run: |
          jq --arg v "${{ needs.test.outputs.nightly-version }}" '.version = $v' \
            packages/gateway/package.json > packages/gateway/package.json.tmp
          mv packages/gateway/package.json.tmp packages/gateway/package.json
          echo "Building nightly version: ${{ needs.test.outputs.nightly-version }}"

      - name: Download staging artifact
        uses: actions/download-artifact@v8
        with:
          name: sea-staging
          path: packages/gateway/.sea-staging/

      - name: Cache fossilize Node binaries
        uses: actions/cache@v5
        with:
          path: .node-cache
          key: fossilize-darwin-arm64-${{ hashFiles('packages/gateway/script/build-binary-sea.ts') }}

      - name: Build darwin-arm64 binary from staging
        run: |
          pnpm --filter @loreai/gateway run build:binary:sea \
            --from-staging .sea-staging \
            --platforms darwin-arm64 --release
          echo "--- Darwin binary: ---"
          ls -la packages/gateway/dist-bin/
        env:
          FOSSILIZE_CACHE_DIR: ${{ github.workspace }}/.node-cache

      - name: Smoke-test
        run: |
          BIN="./packages/gateway/dist-bin/lore-darwin-arm64"
          "$BIN" --version
          info=$("$BIN" --print-vendor-info)
          echo "Vendor info: $info"
          echo "$info" | jq -e '.target == "darwin-arm64" and .localModelPath != null and .version != null' \
            || (echo "::error::vendor not embedded in darwin-arm64 binary"; exit 1)
          "$BIN" --check-embeddings \
            || (echo "::error::--check-embeddings failed in darwin-arm64 binary"; exit 1)
          # Non-fatal on macOS (see binary-smoke-native): unsigned extracted
          # .dylib may be blocked by library validation; degrades to JS fallback.
          vec=$("$BIN" --check-vec)
          echo "Vec info: $vec"
          echo "$vec" | grep -q '^ok vec_version=v' \
            && echo "native sqlite-vec OK (darwin-arm64)" \
            || echo "::warning::native sqlite-vec not loaded in darwin-arm64 (dylib codesigning?) — JS fallback in use: $vec"
          # Read-worker pool path (#1033). Non-fatal on macOS for the same
          # dylib-codesigning reason — degrades to the JS fallback, never crashes.
          echo "$vec" | grep -q '^ok worker vec_available=true' \
            && echo "native sqlite-vec read-worker path OK (darwin-arm64)" \
            || echo "::warning::native sqlite-vec not loaded on the read-worker path in darwin-arm64 (dylib codesigning?) — JS fallback in use: $vec"
          # Generic read-job round-trip through the read-worker pool (#1029).
          # Pure JS + node:sqlite (no dylib), so it is FATAL here too.
          ro=$("$BIN" --check-read-offload || true)
          echo "Read-offload: $ro"
          echo "$ro" | grep -q '^ok read-offload via worker' \
            || (echo "::error::read-worker offload seam broken in darwin-arm64 binary: $ro"; exit 1)

      - name: Verify code signature
        run: |
          BIN="./packages/gateway/dist-bin/lore-darwin-arm64"
          echo "--- Code signature verification ---"
          codesign -v --strict "$BIN"
          echo "codesign -v: passed"
          SIG_INFO=$(codesign -d --verbose=2 "$BIN" 2>&1)
          echo "$SIG_INFO"
          # Verify the binary has SOME signature (ad-hoc or certificate).
          # Update this check if switching to a real Apple Developer certificate.
          echo "$SIG_INFO" | grep -q "Signature=adhoc" \
            || (echo "::error::Binary is not ad-hoc signed — will fail on Apple Silicon"; exit 1)
          echo "Ad-hoc signature verified"

      - name: Upload compressed artifact
        uses: actions/upload-artifact@v7
        with:
          name: nightly-darwin-gz
          path: packages/gateway/dist-bin/*.gz

      - name: Upload uncompressed artifact
        uses: actions/upload-artifact@v7
        with:
          name: nightly-darwin-raw
          path: |
            packages/gateway/dist-bin/lore-*
            !packages/gateway/dist-bin/*.gz

  generate-patches:
    name: Generate Delta Patches
    needs: [changes, test, build-nightly-binaries, build-nightly-darwin]
    if: >-
      needs.changes.outputs.code == 'true' &&
      github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Install ORAS CLI
        run: |
          VERSION=1.3.1
          EXPECTED_SHA256="d52c4af76ce6a3ceb8579e51fb751a43ac051cca67f965f973a0b0e897a2bb86"
          TARBALL="oras_${VERSION}_linux_amd64.tar.gz"
          curl --retry 3 --retry-delay 5 --retry-all-errors -sfLo "$TARBALL" \
            "https://github.com/oras-project/oras/releases/download/v${VERSION}/${TARBALL}"
          echo "${EXPECTED_SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xz -C /usr/local/bin oras < "$TARBALL"
          rm "$TARBALL"

      - name: Install zig-bsdiff
        run: |
          VERSION=0.1.19
          EXPECTED_SHA256="9f1ac75a133ee09883ad2096a86d57791513de5fc6f262dfadee8dcee94a71b9"
          TARBALL="zig-bsdiff-linux-x64.tar.gz"
          curl --retry 3 --retry-delay 5 --retry-all-errors -sfLo "$TARBALL" \
            "https://github.com/blackboardsh/zig-bsdiff/releases/download/v${VERSION}/${TARBALL}"
          echo "${EXPECTED_SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xz -C /usr/local/bin < "$TARBALL"
          rm "$TARBALL"

      - name: Download current binaries
        uses: actions/download-artifact@v8
        with:
          name: nightly-binaries-raw
          path: new-binaries

      - name: Download darwin binary
        uses: actions/download-artifact@v8
        with:
          name: nightly-darwin-raw
          path: new-binaries

      - name: Download current compressed binaries
        uses: actions/download-artifact@v8
        with:
          name: nightly-binaries-gz
          path: new-binaries

      - name: Download darwin compressed binary
        uses: actions/download-artifact@v8
        with:
          name: nightly-darwin-gz
          path: new-binaries

      - name: Download previous nightly binaries from GHCR
        run: |
          VERSION="${{ needs.test.outputs.nightly-version }}"
          REPO="ghcr.io/byk/loreai"

          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

          # Find previous nightly tag
          TAGS=$(oras repo tags "${REPO}" 2>/dev/null | grep '^nightly-[0-9]' | sort -V || echo "")
          PREV_TAG=""
          for tag in $TAGS; do
            if [ "$tag" = "nightly-${VERSION}" ]; then
              break
            fi
            PREV_TAG="$tag"
          done

          if [ -z "$PREV_TAG" ]; then
            echo "No previous versioned nightly found, skipping patches"
            exit 0
          fi
          echo "HAS_PREV=true" >> "$GITHUB_ENV"
          echo "Previous nightly: ${PREV_TAG}"

          # Download and decompress previous nightly binaries
          mkdir -p old-binaries
          PREV_MANIFEST_JSON=$(oras manifest fetch "${REPO}:${PREV_TAG}")
          echo "$PREV_MANIFEST_JSON" | jq -r '.layers[] | select(.annotations["org.opencontainers.image.title"] | endswith(".gz")) | .annotations["org.opencontainers.image.title"] + " " + .digest' | while read -r filename digest; do
            basename="${filename%.gz}"
            echo "  Downloading previous ${basename}..."
            oras blob fetch "${REPO}@${digest}" --output "old-binaries/${filename}"
            gunzip -f "old-binaries/${filename}"
          done

      - name: Generate delta patches
        if: env.HAS_PREV == 'true'
        run: |
          mkdir -p patches
          GENERATED=0

          for new_binary in new-binaries/lore-*; do
            name=$(basename "$new_binary")
            case "$name" in *.gz) continue ;; esac

            old_binary="old-binaries/${name}"
            [ -f "$old_binary" ] || continue

            echo "Generating patch: ${name}.patch"
            bsdiff "$old_binary" "$new_binary" "patches/${name}.patch" --use-zstd

            patch_size=$(stat --printf='%s' "patches/${name}.patch")
            new_size=$(stat --printf='%s' "$new_binary")
            ratio=$(awk "BEGIN { printf \"%.1f\", ($patch_size / $new_size) * 100 }")
            echo "  ${patch_size} bytes (${ratio}% of binary)"
            GENERATED=$((GENERATED + 1))
          done

          echo "Generated ${GENERATED} patches"

      - name: Validate patch sizes
        if: env.HAS_PREV == 'true'
        run: |
          shopt -s nullglob
          # Client rejects chains exceeding 60% of gzipped binary size
          # (SIZE_THRESHOLD_RATIO in delta-upgrade.ts). Use 50% here
          # so single-step patches are caught with margin to spare.
          MAX_RATIO=50

          for patch_file in patches/*.patch; do
            name=$(basename "$patch_file" .patch)
            gz_binary="new-binaries/${name}.gz"
            [ -f "$gz_binary" ] || continue

            patch_size=$(stat --printf='%s' "$patch_file")
            gz_size=$(stat --printf='%s' "$gz_binary")
            ratio=$(awk "BEGIN { printf \"%.0f\", ($patch_size / $gz_size) * 100 }")

            if [ "$ratio" -gt "$MAX_RATIO" ]; then
              echo "::warning::Patch ${name}.patch is ${ratio}% of gzipped binary (limit: ${MAX_RATIO}%) — removing"
              rm "$patch_file"
            fi
          done

      - name: Upload patch artifacts
        if: env.HAS_PREV == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: nightly-patches
          path: patches/*.patch

  publish-nightly:
    name: Publish Nightly to GHCR
    needs: [changes, test, build-nightly-binaries, build-nightly-darwin, generate-patches]
    if: >-
      needs.changes.outputs.code == 'true' &&
      github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download compressed artifacts
        uses: actions/download-artifact@v8
        with:
          name: nightly-binaries-gz
          path: artifacts

      - name: Download darwin compressed artifact
        uses: actions/download-artifact@v8
        with:
          name: nightly-darwin-gz
          path: artifacts

      - name: Download uncompressed artifacts (for SHA-256 computation)
        uses: actions/download-artifact@v8
        with:
          name: nightly-binaries-raw
          path: binaries

      - name: Download darwin uncompressed artifact
        uses: actions/download-artifact@v8
        with:
          name: nightly-darwin-raw
          path: binaries

      - name: Download patch artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        id: download-patches
        with:
          name: nightly-patches
          path: patches

      - name: Install ORAS CLI
        run: |
          VERSION=1.3.1
          EXPECTED_SHA256="d52c4af76ce6a3ceb8579e51fb751a43ac051cca67f965f973a0b0e897a2bb86"
          TARBALL="oras_${VERSION}_linux_amd64.tar.gz"
          curl --retry 3 --retry-delay 5 --retry-all-errors -sfLo "$TARBALL" \
            "https://github.com/oras-project/oras/releases/download/v${VERSION}/${TARBALL}"
          echo "${EXPECTED_SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xz -C /usr/local/bin oras < "$TARBALL"
          rm "$TARBALL"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push binaries to GHCR
        # Push from inside the artifacts directory so ORAS records bare
        # filenames (e.g. "lore-linux-x64.gz") as layer titles, not
        # "artifacts/lore-linux-x64.gz". The CLI matches layers by
        # filename in findLayerByFilename().
        working-directory: artifacts
        run: |
          VERSION="${{ needs.test.outputs.nightly-version }}"
          oras push ghcr.io/byk/loreai:nightly \
            --artifact-type application/vnd.lore.cli.nightly \
            --annotation "org.opencontainers.image.source=https://github.com/BYK/loreai" \
            --annotation "version=${VERSION}" \
            ./*.gz

      - name: Tag versioned nightly
        # Create an immutable versioned tag via zero-copy oras tag.
        # This enables patch chain resolution to find specific nightly versions.
        run: |
          VERSION="${{ needs.test.outputs.nightly-version }}"
          oras tag ghcr.io/byk/loreai:nightly "nightly-${VERSION}"

      - name: Push delta patches to GHCR
        # Upload pre-generated patches from generate-patches job as a
        # :patch-<version> manifest with SHA-256 annotations.
        # Failure here is non-fatal — delta upgrades are optional.
        if: steps.download-patches.outcome == 'success'
        continue-on-error: true
        run: |
          VERSION="${{ needs.test.outputs.nightly-version }}"
          REPO="ghcr.io/byk/loreai"

          # Compute SHA-256 annotations from new binaries and collect patch files
          shopt -s nullglob
          ANNOTATIONS=""
          PATCH_FILES=""
          for patch_file in patches/*.patch; do
            basename_patch=$(basename "$patch_file" .patch)
            new_binary="binaries/${basename_patch}"
            if [ -f "$new_binary" ]; then
              sha256=$(sha256sum "$new_binary" | cut -d' ' -f1)
              ANNOTATIONS="${ANNOTATIONS} --annotation sha256-${basename_patch}=${sha256}"
            fi
            PATCH_FILES="${PATCH_FILES} $(basename "$patch_file")"
          done

          if [ -z "$PATCH_FILES" ]; then
            echo "No patches to push"
            exit 0
          fi

          # Find from-version by listing GHCR nightly tags
          TAGS=$(oras repo tags "${REPO}" 2>/dev/null | grep '^nightly-[0-9]' | sort -V || echo "")
          PREV_TAG=""
          for tag in $TAGS; do
            if [ "$tag" = "nightly-${VERSION}" ]; then break; fi
            PREV_TAG="$tag"
          done

          if [ -z "$PREV_TAG" ]; then
            echo "No previous nightly tag found, skipping patch push"
            exit 0
          fi
          PREV_VERSION="${PREV_TAG#nightly-}"

          cd patches
          eval oras push "${REPO}:patch-${VERSION}" \
            --artifact-type application/vnd.lore.cli.patch \
            --annotation "from-version=${PREV_VERSION}" \
            "${ANNOTATIONS}" \
            "${PATCH_FILES}"

          echo "Pushed patch manifest: patch-${VERSION} (from ${PREV_VERSION})"

  # ---------------------------------------------------------------------------
  # Release: generate delta patches from previous stable release
  # ---------------------------------------------------------------------------

  generate-release-patches:
    name: Generate Release Patches
    needs: [changes, test]
    # Only on release branches, not PRs or main
    if: >-
      needs.changes.outputs.code == 'true' &&
      startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Install zig-bsdiff
        run: |
          VERSION=0.1.19
          EXPECTED_SHA256="9f1ac75a133ee09883ad2096a86d57791513de5fc6f262dfadee8dcee94a71b9"
          TARBALL="zig-bsdiff-linux-x64.tar.gz"
          curl --retry 3 --retry-delay 5 --retry-all-errors -sfLo "$TARBALL" \
            "https://github.com/blackboardsh/zig-bsdiff/releases/download/v${VERSION}/${TARBALL}"
          echo "${EXPECTED_SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xz -C /usr/local/bin < "$TARBALL"
          rm "$TARBALL"

      - name: Download current binaries
        uses: actions/download-artifact@v8
        with:
          name: release-binaries
          path: new-binaries-gz

      - name: Download current raw binaries
        uses: actions/download-artifact@v8
        with:
          name: release-binaries-raw
          path: new-binaries

      - name: Download previous release binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(gh api "repos/${{ github.repository }}/releases?per_page=5" \
            --jq '[.[] | select(.prerelease == false and .draft == false)] | .[0].tag_name // empty')

          if [ -z "$PREV_TAG" ]; then
            echo "No previous stable release found — skipping patch generation"
            exit 0
          fi
          echo "HAS_PREV=true" >> "$GITHUB_ENV"
          echo "Previous release: ${PREV_TAG}"

          shopt -s nullglob
          mkdir -p old-binaries
          for gz in new-binaries-gz/*.gz; do
            name=$(basename "${gz%.gz}")
            echo "  Downloading ${name}.gz from ${PREV_TAG}..."
            gh release download "${PREV_TAG}" \
              --repo "${{ github.repository }}" \
              --pattern "${name}.gz" \
              --dir old-binaries || echo "  Warning: not found, skipping"
          done
          gunzip old-binaries/*.gz 2>/dev/null || true

      - name: Generate delta patches
        if: env.HAS_PREV == 'true'
        run: |
          mkdir -p patches
          GENERATED=0

          for new_binary in new-binaries/lore-*; do
            name=$(basename "$new_binary")
            old_binary="old-binaries/${name}"
            [ -f "$old_binary" ] || continue

            echo "Generating patch: ${name}.patch"
            bsdiff "$old_binary" "$new_binary" "patches/${name}.patch" --use-zstd

            patch_size=$(stat --printf='%s' "patches/${name}.patch")
            new_size=$(stat --printf='%s' "$new_binary")
            ratio=$(awk "BEGIN { printf \"%.1f\", ($patch_size / $new_size) * 100 }")
            echo "  ${patch_size} bytes (${ratio}% of binary)"
            GENERATED=$((GENERATED + 1))
          done

          echo "Generated ${GENERATED} patches"

      - name: Validate patch sizes
        if: env.HAS_PREV == 'true'
        run: |
          shopt -s nullglob
          MAX_RATIO=50

          for patch_file in patches/*.patch; do
            name=$(basename "$patch_file" .patch)
            gz_binary="new-binaries-gz/${name}.gz"
            [ -f "$gz_binary" ] || continue

            patch_size=$(stat --printf='%s' "$patch_file")
            gz_size=$(stat --printf='%s' "$gz_binary")
            ratio=$(awk "BEGIN { printf \"%.0f\", ($patch_size / $gz_size) * 100 }")

            if [ "$ratio" -gt "$MAX_RATIO" ]; then
              echo "::warning::Patch ${name}.patch is ${ratio}% of gzipped binary (limit: ${MAX_RATIO}%) — removing"
              rm "$patch_file"
            fi
          done

      - name: Ensure patches directory exists
        if: startsWith(github.ref, 'refs/heads/release/')
        run: mkdir -p patches && touch patches/empty

      - name: Upload release patches
        if: startsWith(github.ref, 'refs/heads/release/')
        uses: actions/upload-artifact@v7
        with:
          name: release-patches
          # Always upload so Craft's artifact provider finds the artifact.
          # When no previous release has binaries, the directory is empty;
          # the placeholder ensures upload-artifact creates the artifact.
          # (upload-artifact ignores hidden files by default)
          path: patches/

  # ---------------------------------------------------------------------------
  # CI status: single required check for branch protection.
  # Reports success when either (a) all code jobs passed or (b) they were
  # legitimately skipped because only docs changed.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Sync engine integration tests against a REAL Postgres + PostgREST stack.
  #
  # The unit suite mocks PostgREST; these run the actual migrations, RLS,
  # triggers, CHECK constraints, and the real push/pull engine over supabase-js.
  # GitHub's ubuntu runners ship Docker, so the harness can stand up disposable
  # postgres:16-alpine + postgrest containers. Gated by LORE_INTEGRATION=1.
  # ---------------------------------------------------------------------------
  sync-integration:
    name: Sync integration (real Postgres)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: pnpm install --frozen-lockfile
      # Pre-pull images so the per-test timeout covers only container startup.
      - name: Pre-pull container images
        run: |
          docker pull postgres:16-alpine
          docker pull postgrest/postgrest:v12.2.3
      - name: Run sync integration tests
        run: pnpm exec vitest run packages/gateway/test/sync-security.integration.test.ts packages/gateway/test/sync-engine.integration.test.ts
        env:
          LORE_INTEGRATION: '1'
          NODE_NO_WARNINGS: '1'

  # ---------------------------------------------------------------------------
  # Hermes (Python) plugin tests.
  #
  # The lore-hermes plugin is Python; its pytest suite is not covered by the
  # Node/Vitest `test` job. Run it on a Python runtime so a broken Hermes
  # adapter can't ship undetected. Gated on the code path filter like the
  # other heavy jobs.
  # ---------------------------------------------------------------------------
  hermes-test:
    name: Hermes plugin tests (Python)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lore-hermes with test extras
        run: pip install -e "packages/hermes[test]"
      - name: Run hermes tests
        run: python -m pytest packages/hermes/tests/ -q

  # ---------------------------------------------------------------------------
  # Real-hermes ContextEngine ABC check (#1136).
  #
  # `hermes-test` runs the unit suite against a hand-maintained STUB of the
  # Hermes `ContextEngine` ABC, so it can't catch *upstream* drift (a new/renamed
  # abstract method would make `LoreContextEngine` un-instantiable in production
  # while the stubbed suite stays green). This job installs the REAL, unpinned
  # `hermes-agent` and runs a standalone script (outside pytest, so the stub is
  # never injected) that (1) fails on snapshot drift and (2) fails if our engine
  # no longer conforms.
  #
  # Scoped to `packages/hermes/**` changes so it never gates unrelated PRs, and
  # the install step is `continue-on-error` so a transient/unsupported
  # `hermes-agent` can't hard-block a hermes PR — the check self-skips and the
  # job stays green (the stubbed contract test in `hermes-test` still ran).
  # ---------------------------------------------------------------------------
  hermes-real-abc:
    name: Hermes real ContextEngine ABC (drift + conformance)
    needs: [changes]
    if: needs.changes.outputs.hermes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install real hermes-agent + lore-hermes
        id: install
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install hermes-agent
          pip install -e packages/hermes
      - name: Real ContextEngine ABC drift + conformance
        if: steps.install.outcome == 'success'
        run: python packages/hermes/scripts/check_real_context_engine.py
      - name: Note skipped real-ABC check
        if: steps.install.outcome != 'success'
        run: echo "::warning::Skipped real-hermes ABC check — hermes-agent could not be installed (transient or unsupported runtime). The stubbed contract test still ran in hermes-test."

  ci-status:
    name: CI Status
    if: always()
    needs: [changes, test, binary-smoke-native, check-docs, check-links, check-preview-links, check-social, check-patches, actionlint, sync-integration, hermes-test, hermes-real-abc]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI result
        run: |
          if [ "${{ needs.actionlint.result }}" != "success" ]; then
            echo "::error::actionlint job did not succeed (result: ${{ needs.actionlint.result }})"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.code }}" == "true" ]; then
            if [ "${{ needs.test.result }}" != "success" ]; then
              echo "::error::test job did not succeed (result: ${{ needs.test.result }})"
              exit 1
            fi
            result="${{ needs.binary-smoke-native.result }}"
            if [ "$result" == "failure" ] || [ "$result" == "cancelled" ]; then
              echo "::error::binary-smoke-native did not succeed (result: $result)"
              exit 1
            fi
          fi
          # check-docs is required whenever it ran (it self-gates on
          # code-or-docs path filter). When skipped (unrelated change),
          # the result is "skipped" which we treat as success.
          checkDocsResult="${{ needs.check-docs.result }}"
          if [ "$checkDocsResult" == "failure" ] || [ "$checkDocsResult" == "cancelled" ]; then
            echo "::error::check-docs did not succeed (result: $checkDocsResult)"
            exit 1
          fi
          # check-links follows the same self-gating pattern as check-docs.
          checkLinksResult="${{ needs.check-links.result }}"
          if [ "$checkLinksResult" == "failure" ] || [ "$checkLinksResult" == "cancelled" ]; then
            echo "::error::check-links did not succeed (result: $checkLinksResult)"
            exit 1
          fi
          # check-preview-links follows the same self-gating pattern as the
          # other check-* jobs. Without this, a failed preview-links run
          # would still leave ci-status green and the PR would be mergeable
          # with broken preview links (PR #960 follow-up — Seer review).
          checkPreviewLinksResult="${{ needs.check-preview-links.result }}"
          if [ "$checkPreviewLinksResult" == "failure" ] || [ "$checkPreviewLinksResult" == "cancelled" ]; then
            echo "::error::check-preview-links did not succeed (result: $checkPreviewLinksResult)"
            exit 1
          fi
          # check-social follows the same self-gating pattern.
          checkSocialResult="${{ needs.check-social.result }}"
          if [ "$checkSocialResult" == "failure" ] || [ "$checkSocialResult" == "cancelled" ]; then
            echo "::error::check-social did not succeed (result: $checkSocialResult)"
            exit 1
          fi
          # check-patches follows the same self-gating pattern.
          checkPatchesResult="${{ needs.check-patches.result }}"
          if [ "$checkPatchesResult" == "failure" ] || [ "$checkPatchesResult" == "cancelled" ]; then
            echo "::error::check-patches did not succeed (result: $checkPatchesResult)"
            exit 1
          fi
          # sync-integration is required whenever code changed (self-gates on the
          # code path filter); "skipped" on unrelated changes is treated as pass.
          if [ "${{ needs.changes.outputs.code }}" == "true" ]; then
            syncItResult="${{ needs.sync-integration.result }}"
            if [ "$syncItResult" != "success" ]; then
              echo "::error::sync-integration did not succeed (result: $syncItResult)"
              exit 1
            fi
          fi
          # hermes-test is required whenever code changed (self-gates on the
          # code path filter); "skipped" on unrelated changes is treated as pass.
          if [ "${{ needs.changes.outputs.code }}" == "true" ]; then
            hermesResult="${{ needs.hermes-test.result }}"
            if [ "$hermesResult" != "success" ]; then
              echo "::error::hermes-test did not succeed (result: $hermesResult)"
              exit 1
            fi
          fi
          # hermes-real-abc is required only when packages/hermes changed (it
          # self-gates on the hermes path filter); "skipped" otherwise is pass.
          # It tolerates hermes-agent install failures (job stays green), so a
          # genuine failure here means real upstream ABC drift or a conformance
          # break — both actionable in-PR (update tests/contract_spec.py and/or
          # LoreContextEngine).
          if [ "${{ needs.changes.outputs.hermes }}" == "true" ]; then
            hermesAbcResult="${{ needs.hermes-real-abc.result }}"
            if [ "$hermesAbcResult" != "success" ]; then
              echo "::error::hermes-real-abc did not succeed (result: $hermesAbcResult)"
              exit 1
            fi
          fi
          echo "CI passed (code=${{ needs.changes.outputs.code }})"
