name: CCH Seed Check

on:
  schedule:
    # Check every 6 hours for new Claude Code versions
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force-version:
        description: 'Force extraction for a specific version (e.g. 2.1.140)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      needs-extraction: ${{ steps.check.outputs.needs-extraction }}
      latest-version: ${{ steps.check.outputs.latest-version }}
      missing-versions: ${{ steps.check.outputs.missing-versions }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      # scripts/check-cc-version.ts imports the gateway -> @loreai/core chain,
      # which resolves to packages/core/dist. Build core so the import succeeds.
      - run: pnpm --filter @loreai/core run build

      - name: Check for new Claude Code versions
        id: check
        run: |
          if [ -n "${{ inputs.force-version }}" ]; then
            VERSION="${{ inputs.force-version }}"
            {
              echo "needs-extraction=true"
              echo "latest-version=$VERSION"
              echo "missing-versions=[\"$VERSION\"]"
            } >> "$GITHUB_OUTPUT"
            echo "Force extraction for version: $VERSION"
          else
            # check-cc-version.ts exits 1 if extraction is needed
            set +e
            result=$(node scripts/check-cc-version.ts --json 2>&1)
            exit_code=$?
            set -e

            echo "Raw output: $result"

            if [ $exit_code -eq 0 ]; then
              {
                echo "needs-extraction=false"
                echo "latest-version="
                echo "missing-versions=[]"
              } >> "$GITHUB_OUTPUT"
              echo "All versions have known seeds"
            else
              latest=$(echo "$result" | jq -r '.latestVersion // empty')
              missing=$(echo "$result" | jq -c '.missingVersions // []')
              if [ -n "$latest" ] && [ "$missing" != "[]" ]; then
                {
                  echo "needs-extraction=true"
                  echo "latest-version=$latest"
                  echo "missing-versions=$missing"
                } >> "$GITHUB_OUTPUT"
                echo "Missing versions: $missing"
              else
                {
                  echo "needs-extraction=false"
                  echo "latest-version="
                  echo "missing-versions=[]"
                } >> "$GITHUB_OUTPUT"
                echo "Check failed but no versions to extract"
              fi
            fi
          fi

  extract-seed:
    needs: check-version
    if: needs.check-version.outputs.needs-extraction == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      # scripts/extract-cch-seed.ts (and the cch test) import the gateway ->
      # @loreai/core chain, which resolves to packages/core/dist. Build core
      # so the imports succeed.
      - run: pnpm --filter @loreai/core run build

      - name: Extract and apply all missing seeds
        id: extract
        timeout-minutes: 30
        env:
          LATEST_VERSION: ${{ needs.check-version.outputs.latest-version }}
          MISSING_VERSIONS: ${{ needs.check-version.outputs.missing-versions }}
        run: |
          EXTRACTED=()

          # Parse the missing versions list, extract latest version first
          # so WORKER_VERSION gets pinned to it
          VERSIONS=$(echo "$MISSING_VERSIONS" | jq -r '.[]')

          # Reorder: latest first, then the rest
          ORDERED=()
          for v in $VERSIONS; do
            if [ "$v" = "$LATEST_VERSION" ]; then
              ORDERED=("$v" "${ORDERED[@]}")
            else
              ORDERED+=("$v")
            fi
          done

          for VERSION in "${ORDERED[@]}"; do
            echo ""
            echo "========================================"
            echo "Extracting seed for Claude Code v${VERSION}..."
            echo "========================================"

            OUTPUT="/tmp/seed-result-${VERSION}.json"
            node scripts/extract-cch-seed.ts \
              --version "$VERSION" \
              --output "$OUTPUT"

            echo "=== Result ==="
            cat "$OUTPUT"
            echo

            SEED=$(jq -r '.seed' "$OUTPUT")

            # Apply: pin WORKER_VERSION only for the latest version
            if [ "$VERSION" = "$LATEST_VERSION" ]; then
              echo "Applying seed for $VERSION (pinning as WORKER_VERSION)..."
              node scripts/extract-cch-seed.ts --apply "$VERSION" "$SEED"
            else
              echo "Applying seed for $VERSION (backfill, no pin)..."
              node scripts/extract-cch-seed.ts --apply --no-pin "$VERSION" "$SEED"
            fi

            EXTRACTED+=("$VERSION")
          done

          # Output summary
          echo ""
          echo "========================================"
          echo "Extracted seeds for ${#EXTRACTED[@]} version(s): ${EXTRACTED[*]}"
          echo "========================================"
          echo "extracted-count=${#EXTRACTED[@]}" >> "$GITHUB_OUTPUT"
          echo "extracted-versions=${EXTRACTED[*]}" >> "$GITHUB_OUTPUT"

      - name: Verify tests pass
        run: pnpm test packages/gateway/test/cch.test.ts

      - name: Check for existing PR
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest-version }}
        run: |
          BRANCH="cch-seed/${LATEST_VERSION}"
          existing=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "PR #${existing} already exists for ${BRANCH}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.check-pr.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest-version }}
          EXTRACTED_COUNT: ${{ steps.extract.outputs.extracted-count }}
          EXTRACTED_VERSIONS: ${{ steps.extract.outputs.extracted-versions }}
        run: |
          BRANCH="cch-seed/${LATEST_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packages/gateway/src/cch.ts
          git commit -m "feat(cch): add seeds for Claude Code up to ${LATEST_VERSION}"
          git push -u origin "$BRANCH"

          cat > /tmp/pr-body.md <<EOF
          ## Summary

          Automated cch seed extraction for ${EXTRACTED_COUNT} Claude Code version(s).

          - **Versions:** ${EXTRACTED_VERSIONS}
          - **WORKER_VERSION pinned to:** ${LATEST_VERSION}
          - **Extracted by:** \`scripts/extract-cch-seed.ts\`
          - **Method:** Oracle pair generation via local capture server + binary scan

          This PR updates \`VERSION_SEEDS\` and \`WORKER_VERSION\` in \`packages/gateway/src/cch.ts\`
          so the gateway can sign billing headers for these Claude Code versions.
          EOF

          gh pr create \
            --title "feat(cch): add seeds for Claude Code up to ${LATEST_VERSION}" \
            --body-file /tmp/pr-body.md

  notify-failure:
    needs: [check-version, extract-seed]
    if: always() && (needs.check-version.result == 'failure' || needs.extract-seed.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: File failure issue (deduped)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no checkout, so every gh command must target the repo
          # explicitly — gh otherwise shells out to git and fails with
          # "not a git repository".
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest-version }}
          CHECK_RESULT: ${{ needs.check-version.result }}
          EXTRACT_RESULT: ${{ needs.extract-seed.result }}
        run: |
          LABEL="cch-seed-check-failure"
          VER="${LATEST_VERSION:-unknown}"
          MARKER="<!-- cch-seed-check:${VER} -->"

          # Dedupe: reuse an existing open issue carrying this exact marker so
          # the 6-hourly schedule does not file a new issue on every failure.
          # GitHub search ignores punctuation, so match the marker literally
          # against each labelled open issue's body rather than via --search.
          existing=$(gh issue list --repo "$GH_REPO" --state open --label "$LABEL" \
            --json number,body \
            --jq "map(select(.body | contains(\"$MARKER\"))) | .[0].number // empty")
          if [ -n "$existing" ]; then
            echo "Open issue #${existing} already tracks this failure; skipping."
            exit 0
          fi

          # Ensure the label exists (ignore failure if already present).
          gh label create "$LABEL" --repo "$GH_REPO" --color B60205 \
            --description "Automated CCH seed extraction failures" 2>/dev/null || true

          TITLE="CCH Seed Check failed${LATEST_VERSION:+ (v${LATEST_VERSION})}"
          BODY=$(printf '%s\n\nThe scheduled **CCH Seed Check** workflow failed.\n\n- check-version: %s\n- extract-seed: %s\n- Run: %s\n\n_Auto-filed; deduped per latest version._' \
            "$MARKER" "$CHECK_RESULT" "$EXTRACT_RESULT" "$RUN_URL")

          gh issue create --repo "$GH_REPO" --title "$TITLE" --label "$LABEL" --body "$BODY"
