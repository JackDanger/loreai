name: Build sqlite-vec binaries

# Manual producer for the committed prebuilt sqlite-vec extensions in
# packages/sqlite-vec-vendored/prebuilt/. Builds each target on its own NATIVE
# runner (which side-steps the __cpu_model / __builtin_cpu_supports link
# failures seen with cross-compilers), functionally verifies it (vec_version +
# a DiskANN int8 KNN query), and uploads it as an artifact. Download the
# artifacts and commit them under prebuilt/<target>/ — see SOURCE.md.
#
# The linux-x64 binary is additionally verified on every CI run via the package
# vitest suite; the other three targets are verified only here, at build time.

on:
  workflow_dispatch:
  # Rebuild + verify whenever the binary's inputs change (vendored source,
  # patches, the build recipe, or this workflow). Triggered on pull_request (not
  # push) for branch builds so it shares the PR's check-suite with ci.yml rather
  # than claiming a separate push-event suite for the same SHA (which would
  # suppress ci.yml on feature branches). Also runs on push to main to catch
  # source/patch drift committed directly to the default branch.
  pull_request:
    paths:
      - 'packages/sqlite-vec-vendored/upstream/**'
      - 'packages/sqlite-vec-vendored/patches/**'
      - 'packages/sqlite-vec-vendored/scripts/build.sh'
      - '.github/workflows/build-sqlite-vec.yml'
  push:
    branches: [main]
    paths:
      - 'packages/sqlite-vec-vendored/upstream/**'
      - 'packages/sqlite-vec-vendored/patches/**'
      - 'packages/sqlite-vec-vendored/scripts/build.sh'
      - '.github/workflows/build-sqlite-vec.yml'

permissions:
  contents: read

# Cancel a superseded matrix run when a newer commit lands on the same ref.
concurrency:
  group: build-sqlite-vec-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-22.04
          - target: linux-arm64
            runner: ubuntu-22.04-arm
          - target: darwin-arm64
            runner: macos-14
          - target: windows-x64
            runner: windows-2022
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # MSVC toolchain (cl.exe) for the Windows target; sets INCLUDE/LIB/PATH
      # via GITHUB_ENV so the subsequent bash build step can find cl.exe.
      - name: Set up MSVC
        if: matrix.target == 'windows-x64'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build vec0 extension
        shell: bash
        run: packages/sqlite-vec-vendored/scripts/build.sh --target ${{ matrix.target }}

      - name: Verify (load + vec_version + DiskANN int8 KNN)
        shell: bash
        run: node packages/sqlite-vec-vendored/scripts/verify.mjs ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vec0-${{ matrix.target }}
          path: |
            packages/sqlite-vec-vendored/prebuilt/${{ matrix.target }}/vec0.so
            packages/sqlite-vec-vendored/prebuilt/${{ matrix.target }}/vec0.dylib
            packages/sqlite-vec-vendored/prebuilt/${{ matrix.target }}/vec0.dll
          if-no-files-found: error
