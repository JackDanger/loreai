name: Docs Deploy

# Production deploy of the website to GitHub Pages. Kept in its own workflow
# (separate from docs-preview.yml) so it never shares a trigger with the
# PR-preview runs. A merge to main fires both a `push: main` event and a
# `pull_request: closed` event; when both lived in docs-preview.yml, GitHub
# would nondeterministically cancel one of the two runs from the same merge.
# If the cancelled one happened to be the production deploy, the live site
# silently went stale and the main commit showed a ✗. Isolating the deploy
# here guarantees it always runs to completion on merge.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/website/**'
      - '.github/workflows/docs-deploy.yml'

permissions:
  contents: write

concurrency:
  group: docs-deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The Bluesky app password that authenticates the standard.site record
    # publish lives in the `production` environment, so the job must opt into
    # it to read the secret. Mapped to a (possibly empty) env var so the
    # "Publish standard.site records" step below can be skipped via `if` when
    # the secret is not configured (e.g. forks).
    environment: production
    env:
      BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter '@loreai/website' build

      - name: Ensure .nojekyll at gh-pages root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git fetch origin gh-pages:gh-pages 2>/dev/null; then
            if git show gh-pages:.nojekyll &>/dev/null; then
              echo ".nojekyll already exists at gh-pages root"
            else
              echo "Adding .nojekyll to existing gh-pages branch"
              git checkout gh-pages
              touch .nojekyll
              git add .nojekyll
              git commit -m "Add .nojekyll to disable Jekyll processing"
              git push origin gh-pages
              git checkout "$GITHUB_SHA"
            fi
          else
            echo "Creating gh-pages branch with .nojekyll"
            git checkout --orphan gh-pages
            git rm -rf .
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initialize gh-pages with .nojekyll"
            git push origin gh-pages
            git checkout "$GITHUB_SHA"
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages/website/dist
          branch: gh-pages
          clean-exclude: _preview
          force: false

      - name: Publish standard.site records to the @withlore.ai PDS
        # Idempotent putRecord upsert with deterministic rkeys, so this runs on
        # every production deploy and keeps the AT Protocol records in sync with
        # the blog. Reads the freshly built dist/standard-site.json. Skipped
        # automatically when BSKY_APP_PASSWORD is not configured.
        #
        # continue-on-error: the site already deployed in the step above and is
        # valid on its own (on-page .well-known + <link> verification). Syncing
        # the PDS records is a best-effort, idempotent side effect that
        # self-heals on the next deploy, so a transient PDS outage must not mark
        # an otherwise-successful deploy as failed. A real failure still surfaces
        # as a step annotation on the run.
        if: ${{ env.BSKY_APP_PASSWORD != '' }}
        continue-on-error: true
        run: pnpm --filter '@loreai/website' publish:standard-site
