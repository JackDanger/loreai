[test]
preload = ["./packages/core/test/setup.ts"]

[test.env]
NODE_ENV = "test"
# Redundant backstop — the primary gate is in packages/gateway/instrument.ts
# (NODE_ENV==="test" check, which Bun's test runner sets unconditionally). This
# env var is a secondary defense for the rare case where instrument.ts is loaded
# outside the Bun test runner but still in a test-like context.
SENTRY_ENABLED = "0"
