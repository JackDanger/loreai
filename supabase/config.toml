# Supabase project config for Folk Lore.
#
# Link this directory to the live project once:
#   supabase link --project-ref jlwxsrmvomocgngbxmcf
# Then apply migrations with:
#   supabase db push
#
# Auth providers (GitHub OAuth + email magic-link/OTP) are configured in the
# Supabase dashboard, not here — see supabase/README.md.

project_id = "jlwxsrmvomocgngbxmcf"

[auth]
# CLI sign-in uses a loopback `…/callback` redirect for the GitHub OAuth flow.
# Path-aware wildcards are required (a bare host won't match the `/callback`
# path). NOTE: this only governs the local `supabase start` stack — the hosted
# project's redirect allow-list is set in the dashboard (see README step 3).
additional_redirect_urls = ["http://127.0.0.1:*/**", "http://127.0.0.1/**"]

[auth.email]
# Email magic-link / OTP sign-in for non-GitHub users. The OTP code path
# requires `{{ .Token }}` in the Magic Link email template (dashboard).
enable_signup = true

[functions.github-provision]
# E-5-a (#827): mirrors GitHub org/team memberships into Lore teams. verify_jwt=true so only a
# signed-in user can invoke it; it then uses their provider_token to read memberships from GitHub.
verify_jwt = true

[functions.github-discover]
# E-5-d (#630): discovers which of the caller's GitHub repo collaborators already have a Lore
# account. verify_jwt=true so only a signed-in user can invoke it; it binds their provider_token to
# their identity and reads collaborators with the caller's own GitHub access.
verify_jwt = true

[functions.send-invite-email]
# E-5-e (#630/#827): emails a team invitee their join link via SMTP2GO. verify_jwt=true; the function
# authorizes on the invite token (caller must be the scope admin who created it). Requires the
# SMTP2GO_API_KEY function secret.
verify_jwt = true
