<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">Lore.AI X banner v3</title>
  <desc id="desc">An X-safe Lore.AI banner with a subtle brand symbol watermark and large readable launch copy.</desc>
  <defs>
    <radialGradient id="leftGlow" cx="18%" cy="42%" r="58%">
      <stop offset="0" stop-color="#5a8f63" stop-opacity="0.46" />
      <stop offset="0.48" stop-color="#2a4d32" stop-opacity="0.22" />
      <stop offset="1" stop-color="#1a2e1b" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="rightGlow" cx="82%" cy="42%" r="50%">
      <stop offset="0" stop-color="#f7f2e8" stop-opacity="0.14" />
      <stop offset="0.52" stop-color="#8fba96" stop-opacity="0.12" />
      <stop offset="1" stop-color="#1a2e1b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="strokeFade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#8fba96" stop-opacity="0" />
      <stop offset="0.24" stop-color="#c4ddc7" stop-opacity="0.2" />
      <stop offset="0.7" stop-color="#c4ddc7" stop-opacity="0.24" />
      <stop offset="1" stop-color="#8fba96" stop-opacity="0" />
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" />
    </filter>
  </defs>

  <rect width="1500" height="500" fill="#1a2e1b" />
  <rect width="1500" height="500" fill="url(#leftGlow)" />
  <rect width="1500" height="500" fill="url(#rightGlow)" />

  <circle cx="1260" cy="226" r="154" fill="#2a4d32" opacity="0.34" filter="url(#blur)" />
  <image href="brand-symbol.png" x="1138" y="54" width="236" height="264" preserveAspectRatio="xMidYMid meet" opacity="0.22" />

  <g fill="none" stroke="url(#strokeFade)" stroke-width="2" stroke-linecap="round" opacity="0.62">
    <path d="M292 152C478 108 650 126 804 190S1050 282 1228 210 1370 146 1462 166" />
    <path d="M342 358C522 304 702 312 866 354S1086 392 1248 312 1388 250 1456 268" />
    <path d="M406 254C574 222 736 228 906 270S1104 320 1262 246" />
  </g>

  <g fill="#c4ddc7" opacity="0.62">
    <circle cx="372" cy="136" r="3.5" />
    <circle cx="608" cy="126" r="3" />
    <circle cx="804" cy="190" r="4" />
    <circle cx="1010" cy="272" r="3" />
    <circle cx="1228" cy="210" r="4" />
    <circle cx="1380" cy="162" r="3" />
    <circle cx="520" cy="322" r="3" />
    <circle cx="866" cy="354" r="4" />
    <circle cx="1086" cy="378" r="3" />
    <circle cx="1248" cy="312" r="4" />
  </g>

  <g transform="translate(430 154)">
    <text x="0" y="0" fill="#f7f2e8" font-family="'Playfair Display', Georgia, serif" font-size="64" font-style="italic" font-weight="400">Every agent. Every session.</text>
    <text x="1" y="78" fill="#e8ffe9" font-family="'Playfair Display', Georgia, serif" font-size="74" font-style="italic" font-weight="400">One project memory.</text>
    <rect x="4" y="116" width="464" height="1" fill="#c4ddc7" opacity="0.34" />
    <text x="4" y="166" fill="#c4ddc7" font-family="'Playfair Display', Georgia, serif" font-size="34" font-style="italic" font-weight="400" letter-spacing="0">Fair source memory for teams that ship with AI.</text>
  </g>

  <g opacity="0.13" fill="#f7f2e8">
    <text x="66" y="106" font-family="'DM Sans', Arial, Helvetica, sans-serif" font-size="18" letter-spacing="1.8">FAIR SOURCE</text>
    <text x="68" y="338" font-family="'DM Sans', Arial, Helvetica, sans-serif" font-size="18" letter-spacing="1.8">TEAM MEMORY</text>
  </g>
</svg>
