<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">Lore.AI X banner v2</title>
  <desc id="desc">An X-safe Lore.AI banner with the brand symbol, large readable text, and a subtle memory graph background.</desc>
  <defs>
    <radialGradient id="leftGlow" cx="22%" cy="38%" r="58%">
      <stop offset="0" stop-color="#5a8f63" stop-opacity="0.5" />
      <stop offset="0.5" stop-color="#2a4d32" stop-opacity="0.24" />
      <stop offset="1" stop-color="#1a2e1b" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="rightGlow" cx="84%" cy="50%" r="48%">
      <stop offset="0" stop-color="#f7f2e8" stop-opacity="0.13" />
      <stop offset="0.5" stop-color="#8fba96" stop-opacity="0.12" />
      <stop offset="1" stop-color="#1a2e1b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="strokeFade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#8fba96" stop-opacity="0" />
      <stop offset="0.28" stop-color="#c4ddc7" stop-opacity="0.34" />
      <stop offset="0.72" stop-color="#c4ddc7" stop-opacity="0.2" />
      <stop offset="1" stop-color="#8fba96" stop-opacity="0" />
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <rect width="1500" height="500" fill="#1a2e1b" />
  <rect width="1500" height="500" fill="url(#leftGlow)" />
  <rect width="1500" height="500" fill="url(#rightGlow)" />

  <g opacity="0.7">
    <circle cx="1260" cy="242" r="164" fill="#2a4d32" opacity="0.3" filter="url(#blur)" />
    <circle cx="1260" cy="242" r="112" fill="none" stroke="#c4ddc7" stroke-opacity="0.12" stroke-width="2" />
    <circle cx="1260" cy="242" r="58" fill="none" stroke="#c4ddc7" stroke-opacity="0.16" stroke-width="1.5" />
  </g>

  <g fill="none" stroke="url(#strokeFade)" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <path d="M296 128C456 92 640 114 784 184S1042 286 1234 218 1368 138 1460 154" />
    <path d="M318 362C506 300 686 304 858 352S1086 398 1248 312 1386 244 1456 258" />
    <path d="M364 248C548 214 728 222 900 270S1112 322 1260 248" />
  </g>

  <g fill="#c4ddc7" opacity="0.68">
    <circle cx="332" cy="122" r="4" />
    <circle cx="612" cy="118" r="3" />
    <circle cx="792" cy="186" r="4" />
    <circle cx="1018" cy="274" r="3" />
    <circle cx="1234" cy="218" r="4" />
    <circle cx="1370" cy="158" r="3" />
    <circle cx="396" cy="348" r="3" />
    <circle cx="858" cy="352" r="4" />
    <circle cx="1086" cy="378" r="3" />
    <circle cx="1248" cy="312" r="4" />
  </g>

  <circle cx="238" cy="240" r="122" fill="#2a4d32" opacity="0.5" filter="url(#blur)" />
  <image href="brand-symbol.png" x="98" y="64" width="280" height="312" preserveAspectRatio="xMidYMid meet" />

  <g transform="translate(456 126)">
    <text x="0" y="0" fill="#f7f2e8" font-family="'Playfair Display', Georgia, serif" font-size="70" font-style="italic" font-weight="400">Every agent. Every session.</text>
    <text x="2" y="86" fill="#e8ffe9" font-family="'Playfair Display', Georgia, serif" font-size="82" font-style="italic" font-weight="400">One project memory.</text>
    <rect x="4" y="126" width="504" height="1" fill="#c4ddc7" opacity="0.34" />
    <text x="4" y="180" fill="#c4ddc7" font-family="'DM Sans', Arial, Helvetica, sans-serif" font-size="30" font-weight="400" letter-spacing="0.1">Fair source memory for teams that ship with AI.</text>
  </g>

  <g opacity="0.16" fill="#f7f2e8">
    <text x="64" y="420" font-family="'DM Sans', Arial, Helvetica, sans-serif" font-size="18" letter-spacing="1.8">FAIR SOURCE</text>
    <text x="234" y="420" font-family="'DM Sans', Arial, Helvetica, sans-serif" font-size="18" letter-spacing="1.8">TEAM MEMORY</text>
  </g>
</svg>
