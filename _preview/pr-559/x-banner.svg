<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">Lore.AI X banner</title>
  <desc id="desc">A dark green Lore.AI social banner with the tagline Persistent memory for AI coding agents.</desc>
  <defs>
    <radialGradient id="glow" cx="24%" cy="42%" r="62%">
      <stop offset="0" stop-color="#5a8f63" stop-opacity="0.55" />
      <stop offset="0.42" stop-color="#2a4d32" stop-opacity="0.24" />
      <stop offset="1" stop-color="#1a2e1b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#c4ddc7" stop-opacity="0.7" />
      <stop offset="1" stop-color="#5a8f63" stop-opacity="0.05" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="1500" height="500" fill="#1a2e1b" />
  <rect width="1500" height="500" fill="url(#glow)" />

  <g opacity="0.22" stroke="url(#line)" stroke-width="1.4" fill="none">
    <path d="M70 94C210 150 292 118 410 210S640 326 822 230 1094 108 1428 172" />
    <path d="M96 364C240 264 382 306 510 364S846 424 1016 322 1240 224 1450 272" />
    <path d="M186 214C316 176 460 164 626 226S930 316 1114 246 1292 138 1458 122" />
  </g>

  <g opacity="0.58" fill="#c4ddc7">
    <circle cx="140" cy="124" r="4" />
    <circle cx="338" cy="146" r="3" />
    <circle cx="548" cy="240" r="4" />
    <circle cx="780" cy="256" r="3" />
    <circle cx="1058" cy="184" r="4" />
    <circle cx="1306" cy="148" r="3" />
    <circle cx="418" cy="354" r="4" />
    <circle cx="704" cy="402" r="3" />
    <circle cx="1004" cy="330" r="4" />
    <circle cx="1232" cy="252" r="3" />
  </g>

  <circle cx="262" cy="250" r="136" fill="#2a4d32" opacity="0.48" filter="url(#soft)" />
  <image href="brand-symbol.png" x="118" y="86" width="288" height="322" preserveAspectRatio="xMidYMid meet" opacity="0.98" />

  <g transform="translate(610 150)">
    <text x="0" y="0" fill="#f7f2e8" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-style="italic" font-weight="400">Lore<tspan fill="#e8ffe9">.</tspan><tspan fill="#e8ffe9" dx="6">AI</tspan></text>
    <text x="4" y="78" fill="#c4ddc7" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="400" letter-spacing="0.4">Persistent memory for AI coding agents</text>
    <rect x="4" y="118" width="424" height="1" fill="#c4ddc7" opacity="0.35" />
    <text x="4" y="166" fill="#8fba96" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" letter-spacing="0.8">LOCAL-FIRST / SEARCHABLE / WORKFLOW-COMPATIBLE</text>
  </g>
</svg>
